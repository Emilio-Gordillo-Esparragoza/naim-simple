name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
    
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install project and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -e . bandit pip-audit
          # Force the patched setuptools after project install on Python 3.10+.
          # setuptools>=83 dropped 3.9, so the package build backend stays lower.
          # Torch may request setuptools<82, but PYSEC-2026-3447 needs >=83.0.
          python -m pip install --upgrade "setuptools>=83.0"

      - name: Run Bandit security scan
        run: |
          bandit -r naim_simple -ll

      - name: Audit installed dependencies
        run: |
          # Skip the local editable package; it is not published on PyPI yet.
          pip-audit --skip-editable
