name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
    
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install project and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -e . bandit pip-audit

      - name: Run Bandit security scan
        run: |
          bandit -r naim_simple -ll

      - name: Audit installed dependencies
        run: |
          pip-audit
